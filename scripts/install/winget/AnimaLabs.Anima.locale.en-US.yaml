ShortDescription: Identity & credentials infrastructure for AI agents.
Description: |-
  The anima CLI manages OAuth credentials, API keys, and agent identity for AI
  agents. It includes a zero-knowledge vault that never writes secrets to disk,
  a daemon-backed keystroke injector for local agent workflows, and a
  credential broker for production deployments.

