name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # The CLI declares `@anima/contracts` as `file:../anima/packages/contracts`,
      # so we need the anima monorepo checked out as a sibling for `bun install`
      # to resolve. Since anima-labs-ai/anima is private, the default
      # `GITHUB_TOKEN` of this workflow cannot read it. A repo secret
      # `ANIMA_REPO_TOKEN` (a fine-grained PAT with `Contents: Read` on
      # anima-labs-ai/anima) is required.
      #
      # The monorepo is checked out at the commit pinned in `.anima-ref`, NOT
      # at HEAD — anima merges must not be able to break CLI PRs
      # asynchronously (a contracts change did exactly that on 2026-07-06),
      # and releases must be reproducible: release.yml bundles the contracts
      # into dist/cli.js, so the pin decides what ships. To adopt newer
      # contracts, bump the pin deliberately:
      #
      #   git ls-remote https://github.com/anima-labs-ai/anima main   # new SHA
      #   → put it in .anima-ref, fix any typecheck fallout, open a PR.
      #
      # The anima-drift-canary workflow typechecks against anima HEAD daily
      # and files an issue when the pin has drifted into breakage, so bumps
      # don't turn into pre-release ambushes. Local dev still uses whatever
      # ../anima checkout you have — CI is the arbiter.
      - name: Verify ANIMA_REPO_TOKEN secret is configured
        env:
          ANIMA_REPO_TOKEN: ${{ secrets.ANIMA_REPO_TOKEN }}
        run: |
          if [ -z "$ANIMA_REPO_TOKEN" ]; then
            echo "::error::Repo secret ANIMA_REPO_TOKEN is not set."
            echo "::error::CI needs a fine-grained PAT with 'Contents: Read' on anima-labs-ai/anima."
            echo "::error::Steps to fix:"
            echo "::error::  1. Create the PAT at https://github.com/settings/personal-access-tokens"
            echo "::error::  2. Settings -> Secrets and variables -> Actions -> New repository secret"
            echo "::error::     Name: ANIMA_REPO_TOKEN, value: <PAT>"
            exit 1
          fi

      - name: Checkout CLI
        uses: actions/checkout@v4
        with:
          path: cli

      # A rebrand find-replace (anima.email → useanima.sh) once mangled the
      # code identifier `anima.emails.*` into a nonsense token that shipped
      # in SDK READMEs and toolkit source. Fail the build if it ever appears
      # here. The token is assembled at runtime so this workflow file cannot
      # trip its own gate.
      - name: Lint — forbid rebrand-mangle token
        working-directory: cli
        run: |
          banned="useanima.sh"
          banned="${banned}s"
          if grep -rn --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=binaries -e "$banned" .; then
            echo "::error::Found the rebrand-mangle token '$banned' (a mangled 'anima.emails.*' identifier — NOT a domain). Restore the original identifier."
            exit 1
          fi

      # Strict 40-hex validation: the value feeds actions/checkout `ref:`,
      # so reject anything that isn't a plain commit SHA.
      - name: Read pinned anima ref
        id: anima_ref
        run: |
          sha="$(tr -d '[:space:]' < cli/.anima-ref)"
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::.anima-ref must contain a full 40-char lowercase commit SHA, got: '$sha'"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout anima monorepo (for @anima/contracts)
        uses: actions/checkout@v4
        with:
          repository: anima-labs-ai/anima
          path: anima
          ref: ${{ steps.anima_ref.outputs.sha }}
          token: ${{ secrets.ANIMA_REPO_TOKEN }}
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The @anima/contracts package symlinks into the CLI from the
      # anima sibling checkout via `file:../anima/packages/contracts`.
      # When tsc walks the symlinked source it needs to resolve the
      # contracts package's own deps (@orpc/contract, zod) — those
      # live in anima's node_modules, not the CLI's. So install the
      # anima monorepo's deps before typechecking the CLI.
      #
      # Without this step the CLI typecheck fires dozens of
      # "Cannot find module '@orpc/contract'" plus cascading
      # implicit-any errors in CLI files where contract output
      # types couldn't be inferred.
      - name: Install anima monorepo deps (for @anima/contracts type resolution)
        working-directory: anima
        run: bun install --frozen-lockfile

      - name: Install CLI dependencies
        working-directory: cli
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: cli
        run: bun run typecheck

      - name: Run tests
        working-directory: cli
        run: bun run test

      - name: Build
        working-directory: cli
        run: bun run build
