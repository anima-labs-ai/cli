name: Release

# Agent-first distribution: Linux binaries (containers, VMs, CI) + npm package
# (Node/TS agent projects). No macOS/Windows targets — the Anima CLI is
# consumed by agents, not humans clicking on files, so platform-native
# signing (Gatekeeper, SmartScreen) buys nothing over Sigstore + npm
# provenance. The two tracks that matter — and that this workflow ships —
# both run on a tag push:
#
#   1. npm publish with provenance attestation   (Node/TS agent runtimes)
#   2. Signed Linux binaries (x64 + arm64)       (containers, servers, CI)
#
# Both tracks are gated on `github.event_name == 'push'` so a dry-run
# workflow_dispatch can exercise the build matrix without side effects.
#
# Security: no workflow step consumes untrusted external input (issue titles,
# PR bodies, commit messages, branch names, etc.) in run: blocks. Only matrix
# values — defined in this file — and github.event_name (a built-in) appear
# in expressions.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip npm publish and GitHub Release creation"
        required: false
        default: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Gate — forbid the rebrand-mangle token
  # ---------------------------------------------------------------------------
  # A rebrand find-replace (anima.email → useanima.sh) once mangled the code
  # identifier `anima.emails.*` into a nonsense token that shipped in SDK
  # READMEs and toolkit source. Nothing releases while it exists anywhere in
  # this repo. The token is assembled at runtime so this workflow file cannot
  # trip its own gate.
  lint:
    name: Forbid rebrand-mangle token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Grep gate
        run: |
          banned="useanima.sh"
          banned="${banned}s"
          if grep -rn --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=binaries -e "$banned" .; then
            echo "::error::Found the rebrand-mangle token '$banned' (a mangled 'anima.emails.*' identifier — NOT a domain). Restore the original identifier."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Track 1 — npm publish with provenance
  # ---------------------------------------------------------------------------
  # Primary install path for agent projects in the Node/TS ecosystem.
  # Provenance attestation (GitHub OIDC → Sigstore) is verifiable via
  # `npm view @anima-labs/cli --json | jq .dist.attestations`.
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      # `@anima/contracts` is a `file:../anima/packages/contracts` dev
      # dependency, so the anima monorepo must be checked out as a sibling
      # of the CLI for `bun install` to resolve it — the same arrangement
      # ci.yml uses. The monorepo is private, so this needs the
      # `ANIMA_REPO_TOKEN` repo secret (fine-grained PAT with
      # `Contents: Read` on anima-labs-ai/anima).
      - name: Verify ANIMA_REPO_TOKEN secret is configured
        env:
          ANIMA_REPO_TOKEN: ${{ secrets.ANIMA_REPO_TOKEN }}
        run: |
          if [ -z "$ANIMA_REPO_TOKEN" ]; then
            echo "::error::Repo secret ANIMA_REPO_TOKEN is not set."
            echo "::error::The release needs a fine-grained PAT with 'Contents: Read' on anima-labs-ai/anima."
            echo "::error::Steps to fix:"
            echo "::error::  1. Create the PAT at https://github.com/settings/personal-access-tokens"
            echo "::error::  2. Settings -> Secrets and variables -> Actions -> New repository secret"
            echo "::error::     Name: ANIMA_REPO_TOKEN, value: <PAT>"
            exit 1
          fi

      - name: Checkout CLI
        uses: actions/checkout@v4
        with:
          path: cli

      # Build against the anima commit pinned in .anima-ref (not HEAD) so
      # releases are reproducible — the bundled contracts are decided by
      # the pin, not by whatever anima merged last. See ci.yml for the
      # full rationale and how to bump the pin.
      - name: Read pinned anima ref
        id: anima_ref
        run: |
          sha="$(tr -d '[:space:]' < cli/.anima-ref)"
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::.anima-ref must contain a full 40-char lowercase commit SHA, got: '$sha'"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout anima monorepo (for @anima/contracts)
        uses: actions/checkout@v4
        with:
          repository: anima-labs-ai/anima
          path: anima
          ref: ${{ steps.anima_ref.outputs.sha }}
          token: ${{ secrets.ANIMA_REPO_TOKEN }}
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: cli/.bun-version

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # The contracts package's own deps (@orpc/contract, zod) resolve from
      # anima's node_modules through the file: symlink — install those
      # before building the CLI (see ci.yml for the full story).
      - name: Install anima monorepo deps (for @anima/contracts resolution)
        working-directory: anima
        run: bun install --frozen-lockfile

      - name: Install dependencies
        working-directory: cli
        run: bun install --frozen-lockfile

      # tsc emits the library surface + declarations; `bun build` then
      # overwrites dist/cli.js with a self-contained bundle that inlines
      # @anima/contracts (a file: dep that doesn't exist on consumer
      # machines) while keeping registry deps external.
      - name: Build (tsc + bundled bin → dist/)
        working-directory: cli
        run: bun run build

      - name: Publish
        working-directory: cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Track 2 — Signed Linux binaries
  # ---------------------------------------------------------------------------
  # Matrix: x64 + arm64. Each target is signed with Sigstore keyless
  # (no long-lived signing keys — Cosign exchanges the runner's GitHub
  # OIDC token for a short-lived Fulcio cert and records the signature
  # in the public Rekor transparency log). `fail-fast: false` so one
  # target's failure doesn't hide the other's.
  binaries:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-arm64
            outfile: anima-linux-arm64
          - target: bun-linux-x64
            outfile: anima-linux-x64
    env:
      BUN_TARGET: ${{ matrix.target }}
      OUTFILE: ${{ matrix.outfile }}
    steps:
      # Same sibling-checkout arrangement as ci.yml and the publish job:
      # `bun install` (and the --compile bundle) need @anima/contracts from
      # the private anima monorepo checked out next to the CLI.
      - name: Verify ANIMA_REPO_TOKEN secret is configured
        env:
          ANIMA_REPO_TOKEN: ${{ secrets.ANIMA_REPO_TOKEN }}
        run: |
          if [ -z "$ANIMA_REPO_TOKEN" ]; then
            echo "::error::Repo secret ANIMA_REPO_TOKEN is not set."
            echo "::error::The release needs a fine-grained PAT with 'Contents: Read' on anima-labs-ai/anima."
            echo "::error::Steps to fix:"
            echo "::error::  1. Create the PAT at https://github.com/settings/personal-access-tokens"
            echo "::error::  2. Settings -> Secrets and variables -> Actions -> New repository secret"
            echo "::error::     Name: ANIMA_REPO_TOKEN, value: <PAT>"
            exit 1
          fi

      - name: Checkout CLI
        uses: actions/checkout@v4
        with:
          path: cli

      # Build against the anima commit pinned in .anima-ref (not HEAD) so
      # releases are reproducible — the bundled contracts are decided by
      # the pin, not by whatever anima merged last. See ci.yml for the
      # full rationale and how to bump the pin.
      - name: Read pinned anima ref
        id: anima_ref
        run: |
          sha="$(tr -d '[:space:]' < cli/.anima-ref)"
          if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::.anima-ref must contain a full 40-char lowercase commit SHA, got: '$sha'"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout anima monorepo (for @anima/contracts)
        uses: actions/checkout@v4
        with:
          repository: anima-labs-ai/anima
          path: anima
          ref: ${{ steps.anima_ref.outputs.sha }}
          token: ${{ secrets.ANIMA_REPO_TOKEN }}
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: cli/.bun-version

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Install anima monorepo deps (for @anima/contracts resolution)
        working-directory: anima
        run: bun install --frozen-lockfile

      - name: Install dependencies
        working-directory: cli
        run: bun install --frozen-lockfile

      - name: Build binary
        working-directory: cli
        run: |
          mkdir -p binaries
          bun build src/cli.ts \
            --compile \
            --target="$BUN_TARGET" \
            --outfile="binaries/$OUTFILE"

      - name: Emit SHA-256
        working-directory: cli
        run: |
          cd binaries
          sha256sum "$OUTFILE" | tee "$OUTFILE.sha256"

      # Sigstore keyless sign. `--bundle` writes a single file containing
      # the signature, the Fulcio cert chain, and the Rekor transparency-log
      # entry — enough to verify offline without calling back to Sigstore.
      # Verification (documented in SECURITY.md):
      #   cosign verify-blob \
      #     --bundle anima-<target>.sigstore.bundle \
      #     --certificate-identity-regexp 'https://github.com/anima-labs-ai/cli/\.github/workflows/release\.yml@refs/tags/v.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     anima-<target>
      - name: Sign with cosign (keyless, GitHub OIDC)
        working-directory: cli
        run: |
          cd binaries
          cosign sign-blob \
            --bundle "$OUTFILE.sigstore.bundle" \
            --yes \
            "$OUTFILE"

      # Runs on the same Linux runner that built the x64 binary; for arm64
      # the binary is a different architecture than the runner, so it's
      # skipped (gated by the matrix.target check).
      - name: Smoke test (native targets only)
        if: matrix.target == 'bun-linux-x64'
        working-directory: cli
        run: |
          "./binaries/$OUTFILE" --version
          "./binaries/$OUTFILE" vault --help >/dev/null
          "./binaries/$OUTFILE" --help >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.outfile }}
          path: |
            cli/binaries/${{ matrix.outfile }}
            cli/binaries/${{ matrix.outfile }}.sha256
            cli/binaries/${{ matrix.outfile }}.sigstore.bundle
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Aggregate → signed GitHub Release
  # ---------------------------------------------------------------------------
  # Assembles the matrix outputs, signs the aggregate SHA256SUMS manifest
  # with Sigstore (so installers can verify all binaries from one bundle),
  # and publishes the GitHub Release. Optional GPG detached signature for
  # distro pipelines — gated on GPG_SIGNING_KEY presence, skipped cleanly
  # when absent.
  release:
    name: Create GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.binaries.result == 'success' &&
      github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries-staging

      - name: Collect artifacts into release dir
        run: |
          mkdir -p release
          find binaries-staging -type f \
            \( -name 'anima-*' -o -name '*.sha256' -o -name '*.sigstore.bundle' \) \
            -exec cp {} release/ \;
          cd release
          cat *.sha256 > SHA256SUMS
          ls -la

      - name: Sign aggregate SHA256SUMS
        run: |
          cd release
          cosign sign-blob \
            --bundle SHA256SUMS.sigstore.bundle \
            --yes \
            SHA256SUMS

      # Optional GPG detached signature. Gated on secret presence — forks
      # and early-stage releases skip cleanly.
      - name: Import GPG key
        id: gpg_import
        if: ${{ env.GPG_SIGNING_KEY != '' }}
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: GPG-sign SHA256SUMS
        if: steps.gpg_import.outputs.present == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd release
          gpg --batch --yes --pinentry-mode loopback \
            ${GPG_PASSPHRASE:+--passphrase "$GPG_PASSPHRASE"} \
            --armor --detach-sign --output SHA256SUMS.asc \
            SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/anima-*
            release/SHA256SUMS*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # Homebrew tap update
  # ---------------------------------------------------------------------------
  # anima-labs-ai/homebrew-tap carries Formula/anima.rb pointing at the npm
  # registry tarball. Its own `update-formula` workflow resolves the latest
  # version from npm and rewrites the formula — it runs on a schedule AND on
  # repository_dispatch. This job sends that dispatch right after publish so
  # the formula updates within minutes of a release instead of on the next
  # cron tick. The dispatch is a pure wake-up signal: the tap workflow reads
  # the version from the npm registry itself and consumes no payload, so
  # nothing untrusted crosses the repo boundary.
  #
  # Cross-repo dispatch needs a token with write access to homebrew-tap;
  # GITHUB_TOKEN is scoped to this repo only. If HOMEBREW_TAP_TOKEN is not
  # configured the job emits a notice and the tap self-updates on its next
  # scheduled run — the formula stays correct either way.
  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push'
    steps:
      - name: Dispatch tap update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN not configured — skipping immediate dispatch."
            echo "::notice::The tap's scheduled update-formula workflow will pick up this release from npm within 6 hours."
            echo "::notice::To enable immediate updates: create a fine-grained PAT with 'Contents: Read and write' on anima-labs-ai/homebrew-tap and save it as repo secret HOMEBREW_TAP_TOKEN."
            exit 0
          fi
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $HOMEBREW_TAP_TOKEN" \
            https://api.github.com/repos/anima-labs-ai/homebrew-tap/dispatches \
            -d '{"event_type":"cli-release"}'
